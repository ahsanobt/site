<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NEXUS — AI Marketing Agency</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,600;1,9..40,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #080808;
      --surface: #111111;
      --border: rgba(255,255,255,0.08);
      --accent: #C8FF00;
      --accent2: #FF3C5F;
      --text: #F0EDE6;
      --muted: rgba(240,237,230,0.45);
      --font-display: 'Bebas Neue', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --font-mono: 'Space Mono', monospace;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      line-height: 1.5;
      overflow-x: hidden;
      cursor: none; /* Required for the custom circle badge */
    }

    /* --- CIRCLE BADGE ANIMATION --- */
    #circle-badge {
      position: fixed;
      width: 140px;
      height: 140px;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
    }
    #circle-badge svg {
      width: 100%;
      height: 100%;
      animation: rotateCircle 10s linear infinite;
    }
    @keyframes rotateCircle {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    #circle-badge text {
      font-family: var(--font-mono);
      font-size: 12px;
      fill: var(--accent);
      text-transform: uppercase;
      letter-spacing: 2.5px;
    }

    /* NAVIGATION */
    nav {
      position: fixed; top: 0; width: 100%; padding: 2rem 5%;
      display: flex; justify-content: space-between; align-items: center;
      z-index: 1000; transition: all 0.4s ease;
    }
    nav.scrolled {
      padding: 1rem 5%; background: rgba(8,8,8,0.8); backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }
    .logo { font-family: var(--font-display); font-size: 2rem; color: var(--accent); text-decoration: none; }

    /* HERO SECTION & "SAY IT NICELY" ANIMATION */
    .hero {
      height: 100vh; display: flex; flex-direction: column;
      justify-content: center; padding: 0 5%; position: relative;
    }
    .hero h1 {
      font-family: var(--font-display); font-size: clamp(4rem, 10vw, 8rem);
      line-height: 0.9; text-transform: uppercase;
    }

    .carousel-wrap {
      height: 1.1em; overflow: hidden; display: inline-block; vertical-align: bottom; color: var(--accent);
    }
    .carousel-inner { animation: slideUp 10s cubic-bezier(0.85, 0, 0.15, 1) infinite; }
    .carousel-item { height: 1.1em; display: flex; align-items: center; }

    @keyframes slideUp {
      0%, 15% { transform: translateY(0); }
      20%, 35% { transform: translateY(-1.1em); }
      40%, 55% { transform: translateY(-2.2em); }
      60%, 75% { transform: translateY(-3.3em); }
      80%, 95% { transform: translateY(-4.4em); }
      100% { transform: translateY(-5.5em); }
    }

    /* GRID SECTIONS */
    .section { padding: 100px 5%; border-top: 1px solid var(--border); }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; margin-top: 3rem; }
    .card { background: var(--surface); border: 1px solid var(--border); padding: 3rem; transition: 0.3s; }
    .card:hover { border-color: var(--accent); }
    .card h3 { font-family: var(--font-display); font-size: 2rem; margin-bottom: 1rem; }

    /* REVEAL ANIMATION */
    .reveal { opacity: 0; transform: translateY(30px); transition: 1s ease-out; }
    .reveal.visible { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

  <div id="circle-badge">
    <svg viewBox="0 0 100 100">
      <path id="circlePath" d="M 50, 50 m -37, 0 a 37,37 0 1,1 74,0 a 37,37 0 1,1 -74,0" fill="transparent"/>
      <text><textPath xlink:href="#circlePath">* NEXUS AI * MARKET SMARTER * SCALE FASTER *</textPath></text>
    </svg>
  </div>

  <nav id="navbar">
    <a href="#" class="logo">NEXUS</a>
  </nav>

  <section class="hero">
    <h1 class="reveal">
      WE SCALE<br>
      <span class="carousel-wrap">
        <span class="carousel-inner">
          <div class="carousel-item">BRANDS</div>
          <div class="carousel-item">REVENUE</div>
          <div class="carousel-item">STARTUPS</div>
          <div class="carousel-item">FUTURES</div>
          <div class="carousel-item">IDEAS</div>
          <div class="carousel-item">BRANDS</div>
        </span>
      </span>
    </h1>
    <p class="reveal" style="max-width: 500px; margin-top: 2rem; color: var(--muted);">An AI-first creative powerhouse engineered to automate growth.</p>
  </section>

  <section id="services" class="section">
    <h2 class="reveal" style="font-family: var(--font-display); font-size: 4rem;">Services</h2>
    <div class="grid">
      <div class="card reveal"><h3>AI Strategy</h3><p>Custom models for market acquisition.</p></div>
      <div class="card reveal"><h3>Media Buying</h3><p>Automated capital deployment.</p></div>
      <div class="card reveal"><h3>Growth Ops</h3><p>Technical infrastructure for scaling.</p></div>
    </div>
  </section>

  <script>
    // Circle follows mouse
    const badge = document.getElementById('circle-badge');
    let mouseX = 0, mouseY = 0;
    let bX = 0, bY = 0;

    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });

    function move() {
      bX += (mouseX - bX) * 0.1;
      bY += (mouseY - bY) * 0.1;
      badge.style.left = bX + 'px';
      badge.style.top = bY + 'px';
      requestAnimationFrame(move);
    }
    move();

    // Intersection Observer for reveals
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(r => observer.observe(r));

    // Navbar scroll
    window.addEventListener('scroll', () => {
      const nav = document.getElementById('navbar');
      if (window.scrollY > 50) nav.classList.add('scrolled');
      else nav.classList.remove('scrolled');
    });
  </script>
</body>
</html>
