<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SYSTEM_FAILURE // NEXUS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
    
    :root {
      --bg: #030303;
      --glitch-red: #ff003c;
      --glitch-blue: #00f0ff;
      --accent: #C8FF00;
      --text: #ffffff;
      --font-display: 'Bebas Neue', sans-serif;
      --font-mono: 'Space Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      overflow-x: hidden;
      line-height: 1.2;
    }

    /* SCREEN STATIC OVERLAY */
    body::before {
      content: "";
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: repeating-linear-gradient(0deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0) 1px, rgba(255,255,255,0) 2px);
      pointer-events: none; z-index: 9999;
    }

    /* GLITCH ANIMATION */
    @keyframes glitch {
      0% { transform: translate(0); }
      20% { transform: translate(-3px, 2px); }
      40% { transform: translate(-3px, -2px); }
      60% { transform: translate(3px, 2px); }
      80% { transform: translate(3px, -2px); }
      100% { transform: translate(0); }
    }

    /* NAV - BROKEN ALIGNMENT */
    nav {
      position: fixed; top: 0; width: 100%; z-index: 1000;
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 20px; mix-blend-mode: difference;
    }
    .logo { font-family: var(--font-display); font-size: 3rem; color: var(--accent); text-decoration: line-through; }
    .nav-links { transform: rotate(-5deg); background: var(--glitch-red); padding: 5px; }
    .nav-links a { color: black; text-decoration: none; font-weight: bold; margin: 0 10px; font-size: 0.8rem; }

    /* HERO - FRAGMENTED */
    .hero {
      height: 100vh; display: flex; flex-direction: column; 
      justify-content: center; padding: 0 10%; position: relative;
    }
    .glitch-header {
      font-family: var(--font-display);
      font-size: clamp(5rem, 18vw, 15rem);
      line-height: 0.8;
      position: relative;
      animation: glitch 0.3s infinite;
      text-shadow: 2px 0 var(--glitch-red), -2px 0 var(--glitch-blue);
    }

    .carousel-container {
      display: block;
      background: var(--text);
      color: var(--bg);
      padding: 0 20px;
      width: fit-content;
      transform: skewX(-15deg);
    }

    /* DAMAGED SECTIONS */
    section { 
        padding: 100px 5%; 
        border: 2px solid var(--glitch-red);
        margin: 50px;
        position: relative;
    }
    
    .section-title { 
        font-family: var(--font-display); 
        font-size: 5rem; 
        background: var(--accent); 
        color: black; 
        display: inline-block; 
        transform: rotate(2deg);
        margin-bottom: 40px;
    }

    /* GRID - UNEVEN & DISTORTED */
    .grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr 1fr;
      gap: 20px;
    }
    .card {
      border: 1px solid var(--text);
      padding: 30px;
      transition: 0.1s;
    }
    .card:hover {
      background: var(--glitch-blue);
      color: black;
      transform: scale(1.05) rotate(-2deg);
    }

    /* CONTACT - RAW INPUTS */
    .contact-wrap {
        display: flex;
        flex-direction: column;
        gap: 10px;
        max-width: 500px;
    }
    input {
        background: transparent;
        border: 1px solid var(--accent);
        padding: 15px;
        color: var(--accent);
        font-family: var(--font-mono);
    }

    /* DISTORTION ELEMENTS */
    .noise-block {
        position: absolute;
        background: white;
        height: 100px;
        width: 5px;
        top: 20%; right: 5%;
        animation: glitch 0.1s infinite;
    }

    @media (max-width: 800px) {
        .grid { grid-template-columns: 1fr; }
        .glitch-header { font-size: 4rem; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="logo">NEXUS_ERR</div>
    <div class="nav-links">
      <a href="#0">SYS.SRC</a>
      <a href="#0">VOID.NULL</a>
      <a href="#0">TERMINAL</a>
    </div>
  </nav>

  <div class="noise-block"></div>

  <section class="hero">
    <p style="color: var(--glitch-red);">[CRITICAL_FAILURE: REBOOT_REQUIRED]</p>
    <h1 class="glitch-header">
      WE_VOID<br>
      <span class="carousel-container">SYSTEMS</span>
    </h1>
    <p style="max-width: 400px; margin-top: 20px; font-size: 0.7rem; border-left: 5px solid var(--glitch-blue); padding-left: 10px;">
      ERROR: Agency.exe has stopped working. Intelligence is now artificial. Data is bleeding.
    </p>
  </section>

  <section id="services">
    <h2 class="section-title">BROKEN_LOGIC</h2>
    <div class="grid">
      <div class="card">
        <h3>0x01</h3>
        <p>DATA_CORRUPTION_MARKETING</p>
      </div>
      <div class="card" style="margin-top: 40px; border-color: var(--glitch-red);">
        <h3>0x02</h3>
        <p>NEURAL_GHOST_DESIGN</p>
      </div>
      <div class="card">
        <h3>0x03</h3>
        <p>SYNTHETIC_SCALING</p>
      </div>
    </div>
  </section>

  <section id="contact">
    <h2 class="section-title" style="background: var(--glitch-red);">SEND_SIGNAL</h2>
    <div class="contact-wrap">
      <input type="text" value="ANONYMOUS_USER_01">
      <input type="text" placeholder="ENCRYPTED_MESSAGE">
      <button style="background: var(--accent); padding: 20px; border: none; font-weight: bold;">UPLOADING...</button>
    </div>
  </section>

  <script>
    // Mouse interaction - slightly moving the header based on cursor
    const header = document.querySelector('.glitch-header');
    document.addEventListener('mousemove', (e) => {
        const x = (window.innerWidth / 2 - e.pageX) / 30;
        const y = (window.innerHeight / 2 - e.pageY) / 30;
        header.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
    });

    // Randomly change card colors to simulate flickering
    setInterval(() => {
        const cards = document.querySelectorAll('.card');
        const randomCard = cards[Math.floor(Math.random() * cards.length)];
        randomCard.style.borderColor = Math.random() > 0.5 ? '#ff003c' : '#ffffff';
    }, 500);
  </script>
</body>
</html>
